workflows:
  ios-test-build:
    name: iOS Test Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Install pods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS without signing
        script: flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app